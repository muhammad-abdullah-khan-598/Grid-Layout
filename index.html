<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layouts</title>
</head>
<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
    text-align: center;
  }
  
  .header{
    background-color: rgb(0, 55, 118);;
    width: 100%;
    height: 10vh;
    color: white;
    padding: 5px;
    border-bottom: 2px solid black;
    
    
  }
  
  .layouts{
    margin: 10px;
    display: flex;
    flex-direction: column;
  }
  
  .box{
    margin: 2vh 5vw;
    background-color: rgb(0, 55, 118);;
    color: white;
    border: 2px solid black;
    border-radius: 10px;
    height: 10vh;
  }
  
  .box h3{
    
    margin: 5px;
  }
  
  button{
    border-radius: 5px;
    border: none;
    padding: 2px;
  }
  
  .footer{
    background-color: rgb(0, 55, 118);;
    width: 100%;
    height: 10vh;
    color: white;
    border-top: 2px solid black;
  }
  
  .footer p{
    padding: 5px;
  }
  
</style>
<body>
    <header class="header">
        <h2>GRID LAYOUTS</h2>
    </header>
        <div class="layouts">
            <div class="box">
